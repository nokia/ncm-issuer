# Number of ncm-issuer replicas to run
replicaCount: 1

# Pod priority class (if you have any configured)
priorityClassName: ""

# Container image for the ncm-issuer controller
image:
  repository: ghcr.io/nokia/ncm-issuer
  tag: 1.2.2
  pullPolicy: Always
  pullSecrets: []

# Optionally run a troubleshooting sidecar
sidecar:
  enabled: false
  repository: ghcr.io/nokia/ncm-issuer-utils
  tag: 1.2.2
  pullPolicy: Always
  pullSecrets: []
  # Container-level security context for the troubleshooting sidecar.
  # Drops every capability and adds back only the ones tcpdump/strace need.
  # allowPrivilegeEscalation must stay true so file capabilities (set via
  # setcap on the binaries inside the image) are applied on exec; with
  # no_new_privs (allowPrivilegeEscalation: false) the kernel refuses to
  # honour file caps and tcpdump/strace would fail.
  securityContext:
    runAsNonRoot: true
    runAsUser: 998
    allowPrivilegeEscalation: true
    capabilities:
      drop:
      - ALL
      add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
    seccompProfile:
      type: RuntimeDefault

# Limits to cap the resource usage of ncm-issuer pods
# NOTE: exceeding memory limit will cause the pod to be killed by Kubernetes
resources:
  limits:
    cpu: 400m
    memory: 500Mi
  # Requests to help kubernetes start pods on a node that has sufficient capacity.
  requests:
    cpu: 400m
    memory: 500Mi

# Deployment update strategy
updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate  # Allow up to 1 pod unavailable during updates

# Whether to create ServiceAccount, Role and RoleBinding for ncm-issuer
rbac:
  create: true
  # If create is set to false below objects should be created manually
  # Only rbac.sa will be used further by this chart
  sa: ncm-issuer-sa
  binding: ncm-issuer-role-binding
  role: ncm-issuer-role

# Whether to create the ClusterRole/Binding for cert-manager approver
certManagerRbac:
  create: true
  namespace: cert-manager
  sa: cert-manager
  binding: cert-manager-controller-approve:ncm-certmanager-nokia-com
  role: cert-manager-controller-approve:ncm-certmanager-nokia-com

  operatorWorkaround:  # Only enable when cert-manager is installed via the OLM/operator
    enable: false

# NodeSelector/tolerations to pin ncm-issuer onto edge/external-capable nodes
# (as NCM is typically outside k8s cluster)
controller:
  nodeSelector: {}
  tolerations:
  #- key: 'is_edge'
  #  operator: 'Equal'
  #  value: 'true'
  #  effect: 'NoExecute'

# Internal service name for chatting with the ncm-issuer pod
service:
  name: ncm-issuer-svc
  type: ClusterIP
  externalPort: 80
  http:
    port: 80

# Whether to install the CRD for your custom Issuer, e.g. certmanager.ncm.nokia.com
crdEnabled: true

# Health probes (liveness / readiness)
livenessProbe: false
readinessProbe: false

# Enable leader election for HA setups
enableLeaderElection: true

# Pod-level security context applied to all containers in the pod.
# Holds fields that are only valid at the pod level (or that we want shared
# by every container in the pod).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context for the ncm-issuer controller container.
# Defaults align with the Pod Security Standards "restricted" profile.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
    - ALL
  seccompProfile:
    type: RuntimeDefault

# How metrics are exposed
metrics:
  port: 8080

# Prometheus operator configuration
prometheus:
  serviceMonitor:
    enabled: false
    selectorLabel: stable
    namespace: default

# Logging level configuration
logging:
  # Set the verbosity of logging in ncm-issuer. Can be one of 'debug', 'info',
  # 'error', or any integer value in the range <1; 3> which corresponds to debug
  # levels of increasing verbosity.
  logLevel: info
  # Level at and above which stacktraces are captured (one of 'info', 'error' or
  # 'panic').
  stacktraceLevel: panic

# Outbound proxy settings for connecting to NCM via HTTP(S) proxy
# These values are injected as standard env vars: HTTP_PROXY/HTTPS_PROXY/NO_PROXY
# (and their lowercase equivalents) and used by Go's HTTP client
proxy:
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""
