name: release ncm-issuer
on:
  release:
    types: [published]

jobs:
  docker:
    name: "publish release on GitHub Container Registry"
    runs-on: ubuntu-latest
    environment:
      name: ghcr
      url: https://github.com/nokia/ncm-issuer/pkgs/container/ncm-issuer
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: "get ncm-issuer image version"
        run: echo TAG=$(grep -m1 imageVersion main.go | cut -d '"' -f2) >> $GITHUB_ENV

      - name: "login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: "set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "build and publish"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/nokia/ncm-issuer:latest,ghcr.io/nokia/ncm-issuer:${{ env.TAG }}

  docker-utils:
    name: "publish troubleshooting sidecar on GitHub Container Registry"
    runs-on: ubuntu-latest
    environment:
      name: ghcr-utils
      url: https://github.com/nokia/ncm-issuer/pkgs/container/ncm-issuer-utils
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: "get ncm-issuer image version"
        run: echo TAG=$(grep -m1 imageVersion main.go | cut -d '"' -f2) >> $GITHUB_ENV

      - name: "login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: "set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "build and publish"
        uses: docker/build-push-action@v7
        with:
          context: ./ncm-issuer-utils/docker
          file: ./ncm-issuer-utils/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/nokia/ncm-issuer-utils:latest,ghcr.io/nokia/ncm-issuer-utils:${{ env.TAG }}

  package:
    name: "build and attach release tarball"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: "resolve tarball name"
        run: |
          APP_VERSION=$(grep -m1 chartVersion main.go | cut -d '"' -f2)
          BUILD_VERSION=$(grep -m1 imageVersion main.go | cut -d '"' -f2)
          echo "ASSET=ncm-issuer-${APP_VERSION}-${BUILD_VERSION}.tar.gz" >> $GITHUB_ENV

      - name: "set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "build release tarball"
        run: make pack-app

      - name: "upload tarball to release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "${{ env.ASSET }}" --clobber

  package-utils:
    name: "build and attach troubleshooting sidecar image tarball"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: "resolve tarball path"
        run: |
          BUILD_VERSION=$(grep -m1 imageVersion main.go | cut -d '"' -f2)
          echo "ASSET=builds/ncm-issuer-utils-images/ncm-issuer-utils-${BUILD_VERSION}.tgz" >> $GITHUB_ENV

      - name: "set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "build troubleshooting sidecar image tarball"
        run: make docker-save-utils

      - name: "upload tarball to release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "${{ env.ASSET }}" --clobber

  pages:
    name: Build mkdocs and helm charts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        ref: main

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.x

    - name: Install MkDocs and dependencies
      run: |
        pip install mkdocs-material mkdocs-awesome-pages-plugin

    - name: Create release notes file
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name }}
        RELEASE_NAME: ${{ github.event.release.name }}
        RELEASE_BODY: ${{ github.event.release.body }}
      run: |
        mkdir -p ./docs/release-notes
        release_file="./docs/release-notes/${RELEASE_TAG}.md"
        printf -- '---\ntitle: %s\n---\n\n' "$RELEASE_NAME" > "$release_file"
        printf '%s\n' "$RELEASE_BODY" >> "$release_file"
        awk '{ print } /^nav:$/ { print "    - " ENVIRON["RELEASE_NAME"] ".md" }' docs/release-notes/.pages > docs/release-notes/.pages.tmp
        mv docs/release-notes/.pages.tmp docs/release-notes/.pages

    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: Write release notes to documentation
        file_pattern: './docs/release-notes'
        skip_checkout: true

    - name: Build MkDocs Configuration
      run: |
        mkdocs build

    - name: Package charts
      run: helm package helm/

    - name: Checkout to gh-pages
      uses: actions/checkout@v7
      with:
        ref: gh-pages
        clean: false

    - name: Move files to the pages gh-pages
      run: |
        mkdir -p ./docs && rm -rf ./docs/* && mv ./site/* ./docs
        mkdir -p ./charts && mv ./*.tgz ./charts

    - name: Index charts
      run: helm repo index ./charts

    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: Update documentation
        file_pattern: './docs'
        skip_checkout: true

    - uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: Update helm charts
        file_pattern: './charts'
        skip_checkout: true
