run:
  timeout: 5m

linters-settings:
  dupl:
    threshold: 100

  errcheck:
    check-type-assertions: true

  gocritic:
    disabled-checks:
      - ifElseChain
      - wrapperFunc

  govet:
    disable:
      - fieldalignment
    enable:
      - shadow

  nakedret:
    max-func-lines: 0

  nolintlint:
    allow-no-explanation:
      - gocognit
    require-explanation: true
    require-specific: true
    exhaustive:
      check:
        - switch
        - map

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - asciicheck
    - bidichk
    - bodyclose
    - dupl
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - gocheckcompilerdirectives
    - goconst
    - gocritic
    - godot
    - goimports
    - gomoddirectives
    - gosec
    - loggercheck
    - nakedret
    - nilerr
    - nilnil
    - nolintlint
    - nonamedreturns
    - predeclared
    - promlinter
    - reassign
    - stylecheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace

issues:
  exclude-dirs:
    - .git
    - .github
    - api
    - config
    - hack
    - helm
  max-same-issues: 50
  exclude-rules:
    - source: "(noinspection|TODO)"
      linters: [ godot ]
    - source: "//noinspection"
      linters: [ gocritic ]
    - path: "_test\\.go"
      linters:
        - errcheck
        - bodyclose
        - dupl
        - goconst
        - gosec
        - unused
    # GetEventRecorderFor is deprecated in controller-runtime 0.24 or newer but
    # it still works. Migration to the new events.EventRecorder API is deferred.
    # staticcheck SA1019 detection for this cross-package deprecation depends on
    # the analysis cache state, so it is excluded here rather than with an inline
    # //nolint:staticcheck directive that nolintlint reports as unused whenever
    # SA1019 does not fire.
    - path: "(^|/)main\\.go$"
      linters:
        - staticcheck
      text: "SA1019.*GetEventRecorderFor"
